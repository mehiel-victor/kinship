name: Vercel CI/CD

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: vercel-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  VERCEL_CLI_VERSION: "54.9.1"

jobs:
  validate:
    name: Validate app
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint client
        run: npm run lint --workspace client

      - name: Build client
        run: npm run build --workspace client

      - name: Test server
        run: npm test --workspace server

  deploy-preview:
    name: Deploy preview
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@${{ env.VERCEL_CLI_VERSION }}

      - name: Pull Vercel preview environment
        working-directory: client
        run: vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"

      - name: Build Vercel preview artifact
        working-directory: client
        run: vercel build --token="$VERCEL_TOKEN"

      - name: Deploy Vercel preview
        id: deploy
        working-directory: client
        run: |
          set -euo pipefail
          deploy_output="$(vercel deploy --prebuilt --token="$VERCEL_TOKEN")"
          deploy_url="$(printf '%s\n' "$deploy_output" | grep -Eo 'https://[^[:space:]]+\.vercel\.app[^[:space:]]*' | tail -n 1 || true)"
          if [ -z "$deploy_url" ]; then
            printf '%s\n' "$deploy_output"
            exit 1
          fi
          echo "url=$deploy_url" >> "$GITHUB_OUTPUT"
          echo "### Vercel Preview" >> "$GITHUB_STEP_SUMMARY"
          echo "$deploy_url" >> "$GITHUB_STEP_SUMMARY"

      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Vercel preview: ${url}`
            });

  deploy-production:
    name: Deploy production
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@${{ env.VERCEL_CLI_VERSION }}

      - name: Pull Vercel production environment
        working-directory: client
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build Vercel production artifact
        working-directory: client
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy Vercel production
        id: deploy
        working-directory: client
        run: |
          set -euo pipefail
          deploy_output="$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")"
          deploy_url="$(printf '%s\n' "$deploy_output" | grep -Eo 'https://[^[:space:]]+\.vercel\.app[^[:space:]]*' | tail -n 1 || true)"
          if [ -z "$deploy_url" ]; then
            printf '%s\n' "$deploy_output"
            exit 1
          fi
          echo "url=$deploy_url" >> "$GITHUB_OUTPUT"
          echo "### Vercel Production" >> "$GITHUB_STEP_SUMMARY"
          echo "$deploy_url" >> "$GITHUB_STEP_SUMMARY"
